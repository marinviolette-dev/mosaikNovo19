<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mosaïque TV de Martin <3</title>

<link rel="stylesheet" href="style.css">

<style>

body {
    margin: 0;
    overflow: hidden;
}

/* chatons */
.kitten {
    position: fixed;
    width: 100px;
    height: auto;
    z-index: 1;
    pointer-events: none;
}

/* texte au-dessus */
.home h1,
.home .groups {
    position: relative;
    z-index: 10;
}

h1 {
    text-align: center;
    margin-top: 20px;
}

.groups {
    text-align: center;
    margin-top: 20px;
}

button {
    margin: 5px;
}

</style>
</head>

<body class="home">

<h1>Mosaïque TV de Martin <3</h1>

<div class="groups">

<button onclick="openGroup('g1')">
BFMTV / LCI / CNEWS / France Info
</button>

<button onclick="openGroup('g2')">
BFMTV / LCI / France Info / NOVO19
</button>

<button onclick="openGroup('g3')">
BFMTV / TF1 / France 2 / CNEWS
</button>

</div>

<script>

function openGroup(group){
    window.location.href = "mosaic.html?group=" + group;
}

/* -----------------------------
   CONFIG
----------------------------- */

const kittenCount = 14;
const kittens = [];

/* -----------------------------
   CREATE KITTENS
----------------------------- */

for(let i = 0; i < kittenCount; i++){

    const el = document.createElement("img");
    el.src = "asset/chaton.jpeg";
    el.className = "kitten";

    document.body.appendChild(el);

    const size = 160 + Math.random() * 80;

    kittens.push({
        el,

        x: Math.random() * (window.innerWidth - size),
        y: Math.random() * (window.innerHeight - size),

        dx: (Math.random() * 3 + 1.5) * (Math.random() < 0.5 ? -1 : 1),
        dy: (Math.random() * 3 + 1.5) * (Math.random() < 0.5 ? -1 : 1),

        size: size
    });
}

/* -----------------------------
   ANIMATION (DVD STYLE)
----------------------------- */

function animate(){

    for(const k of kittens){

        k.x += k.dx;
        k.y += k.dy;

        const size = k.size;

        /* rebond */
        if(k.x <= 0 || k.x + size >= window.innerWidth){
            k.dx *= -1;
        }

        if(k.y <= 0 || k.y + size >= window.innerHeight){
            k.dy *= -1;
        }

        k.el.style.left = k.x + "px";
        k.el.style.top = k.y + "px";

        k.el.style.width = size + "px";
    }

    requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
