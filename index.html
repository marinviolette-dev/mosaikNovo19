<script>

function openGroup(group){
    window.location.href = "mosaic.html?group=" + group;
}

/* -----------------------------
   CONFIG
----------------------------- */

const kittenCount = 7;
const kittens = [];

/* -----------------------------
   INITIALISATION
----------------------------- */

for(let i = 0; i < kittenCount; i++){

    const el = document.createElement("img");
    el.src = "asset/chaton.png";
    el.className = "dvd-kitten";
    el.style.position = "fixed";
    el.style.pointerEvents = "none";
    el.style.zIndex = "1";

    document.body.appendChild(el);

    kittens.push({
        el: el,

        x: Math.random() * window.innerWidth,
        y: Math.random() * window.innerHeight,

        dx: (Math.random() * 3 + 1.2) * (Math.random() < 0.5 ? -1 : 1),
        dy: (Math.random() * 3 + 1.2) * (Math.random() < 0.5 ? -1 : 1),

        scale: 0.6 + Math.random() * 1.2,
        rotation: Math.random() * 360
    });
}

/* -----------------------------
   ANIMATION
----------------------------- */

function animate(){

    for(const k of kittens){

        k.x += k.dx;
        k.y += k.dy;

        const w = k.el.offsetWidth || 120;
        const h = k.el.offsetHeight || 120;

        if(k.x <= 0 || k.x + w >= window.innerWidth){
            k.dx *= -1;
            if(Math.random() < 0.4) triggerCrazyEffect(k);
        }

        if(k.y <= 0 || k.y + h >= window.innerHeight){
            k.dy *= -1;
            if(Math.random() < 0.4) triggerCrazyEffect(k);
        }

        k.el.style.left = k.x + "px";
        k.el.style.top = k.y + "px";

        k.el.style.width = (80 * k.scale) + "px";

        k.el.style.transform =
            `scale(${k.scale}) rotate(${k.rotation}deg)`;
    }

    requestAnimationFrame(animate);
}

/* -----------------------------
   EFFETS
----------------------------- */

function triggerCrazyEffect(k){

    const effect = Math.floor(Math.random() * 3);

    if(effect === 0){

        k.scale = 0.6 + Math.random() * 1.4;

    } else if(effect === 1){

        k.rotation += 360;

    } else {

        k.scale = 1.8;

        setTimeout(() => {
            k.scale = 0.8 + Math.random() * 1.2;
        }, 300);
    }
}

/* -----------------------------
   START
----------------------------- */

animate();

</script>


<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mosaïque TV de Martin <3</title>

<link rel="stylesheet" href="style.css">

<style>

#dvd-kitten{
    position:fixed;
    width:120px;
    height:auto;
    z-index:1;
    pointer-events:none;
    left:100px;
    top:100px;
    transition:
        transform 0.4s ease,
        filter 0.5s ease;
}

.home h1,
.home .groups{
    position:relative;
    z-index:10;
}

</style>
</head>

<body class="home">

<img id="dvd-kitten" src="asset/chaton.jpeg" alt="Chaton">

<h1>Mosaïque TV de Martin <3</h1>

<div class="groups">

<button onclick="openGroup('g1')">
BFMTV / LCI / CNEWS / France Info
</button>

<button onclick="openGroup('g2')">
BFMTV / LCI / France Info / NOVO19
</button>

<button onclick="openGroup('g3')">
BFMTV / TF1 / France 2 / CNEWS
</button>

</div>

<script>

function openGroup(group){
    window.location.href = "mosaic.html?group=" + group;
}

const kitten = document.getElementById("dvd-kitten");

let x = 100;
let y = 100;

let dx = 2.2;
let dy = 2.2;

let scale = 1;
let rotation = 0;

function animate(){

    x += dx;
    y += dy;

    const w = kitten.offsetWidth;
    const h = kitten.offsetHeight;

    if(x <= 0 || x + w >= window.innerWidth){

        dx *= -1;

        if(Math.random() < 0.4){
            triggerCrazyEffect();
        }
    }

    if(y <= 0 || y + h >= window.innerHeight){

        dy *= -1;

        if(Math.random() < 0.4){
            triggerCrazyEffect();
        }
    }

    kitten.style.left = x + "px";
    kitten.style.top = y + "px";

    requestAnimationFrame(animate);
}

function triggerCrazyEffect(){

    const effect = Math.floor(Math.random() * 3);

    if(effect === 0){

        scale = 0.8 + Math.random() * 0.8;

        kitten.style.transform =
            `scale(${scale}) rotate(${rotation}deg)`;

    }

    else if(effect === 1){

        rotation += 360;

        kitten.style.transform =
            `scale(${scale}) rotate(${rotation}deg)`;

    }

    else{

        scale = 1.5;

        kitten.style.transform =
            `scale(${scale}) rotate(${rotation}deg)`;

        setTimeout(() => {

            scale = 1;

            kitten.style.transform =
                `scale(${scale}) rotate(${rotation}deg)`;

        }, 300);
    }
}

setInterval(() => {

    if(Math.random() < 0.25){
        triggerCrazyEffect();
    }

}, 5000);

animate();

</script>

</body>
</html>
