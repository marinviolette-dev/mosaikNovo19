
</script>


<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mosaïque TV de Martin <3</title>

<link rel="stylesheet" href="style.css">

<style>

#dvd-kitten{
    position:fixed;
    width:120px;
    height:auto;
    z-index:1;
    pointer-events:none;
    left:100px;
    top:100px;
    transition:
        transform 0.4s ease,
        filter 0.5s ease;
}

.home h1,
.home .groups{
    position:relative;
    z-index:10;
}

</style>
</head>

<body class="home">

<img id="dvd-kitten" src="asset/chaton.jpeg" alt="Chaton">

<h1>Mosaïque TV de Martin <3</h1>

<div class="groups">

<button onclick="openGroup('g1')">
BFMTV / LCI / CNEWS / France Info
</button>

<button onclick="openGroup('g2')">
BFMTV / LCI / France Info / NOVO19
</button>

<button onclick="openGroup('g3')">
BFMTV / TF1 / France 2 / CNEWS
</button>

</div>


<script>

function openGroup(group){
    window.location.href = "mosaic.html?group=" + group;
}

const baseKitten = document.getElementById("dvd-kitten");
const kittens = [];

const kittenCount = 7;

/* IMPORTANT : on rend le chaton original invisible (sinon doublon) */
baseKitten.style.display = "none";

/* création des 7 chatons */
for(let i = 0; i < kittenCount; i++){

    const clone = baseKitten.cloneNode(true);
    clone.style.display = "block";
    clone.id = "";

    document.body.appendChild(clone);

    kittens.push({
        el: clone,

        x: Math.random() * (window.innerWidth - 120),
        y: Math.random() * (window.innerHeight - 120),

        dx: (Math.random() * 3 + 1.5) * (Math.random() < 0.5 ? -1 : 1),
        dy: (Math.random() * 3 + 1.5) * (Math.random() < 0.5 ? -1 : 1),

        scale: 0.6 + Math.random() * 1.2,
        rotation: Math.random() * 360
    });
}

function animate(){

    for(const k of kittens){

        k.x += k.dx;
        k.y += k.dy;

        const w = 120;
        const h = 120;

        if(k.x <= 0 || k.x + w >= window.innerWidth){
            k.dx *= -1;
        }

        if(k.y <= 0 || k.y + h >= window.innerHeight){
            k.dy *= -1;
        }

        k.el.style.left = k.x + "px";
        k.el.style.top = k.y + "px";

        k.el.style.width = (80 * k.scale) + "px";

        k.el.style.position = "fixed";
        k.el.style.zIndex = "1";

        k.el.style.transform =
            `scale(${k.scale}) rotate(${k.rotation}deg)`;
    }

    requestAnimationFrame(animate);
}

animate();

</script>
