<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mosaïque TV de Martin <3</title>

<link rel="stylesheet" href="style.css">

<style>

body {
    margin: 0;
    overflow: hidden;
}

/* chatons */
.kitten {
    position: fixed;
    width: 100px;
    height: auto;
    z-index: 1;
    pointer-events: none;
    transition:
        transform 1s linear,
        filter 0.5s ease;
}

/* texte au-dessus */
.home h1,
.home .groups {
    position: relative;
    z-index: 10;
}

h1 {
    text-align: center;
    margin-top: 20px;
}

.groups {
    text-align: center;
    margin-top: 20px;
}

button {
    margin: 5px;
}

</style>
</head>

<body class="home">

<h1>Mosaïque TV de Martin <3</h1>

<div class="groups">

<button onclick="openGroup('g1')">
BFMTV / LCI / CNEWS / France Info
</button>

<button onclick="openGroup('g2')">
BFMTV / LCI / France Info / NOVO19
</button>

<button onclick="openGroup('g3')">
BFMTV / TF1 / France 2 / CNEWS
</button>

</div>

<script>

function openGroup(group){
    window.location.href = "mosaic.html?group=" + group;
}

/* -----------------------------
   CONFIG
----------------------------- */

const kittenCount = 14;
const kittens = [];

const colorFilters = [
    "hue-rotate(0deg)",
    "hue-rotate(45deg)",
    "hue-rotate(90deg)",
    "hue-rotate(135deg)",
    "hue-rotate(180deg)",
    "hue-rotate(225deg)",
    "hue-rotate(270deg)",
    "hue-rotate(315deg)",
    "saturate(2)",
    "sepia(1)",
    "invert(1)",
    "contrast(1.5)"
];

/* -----------------------------
   CREATE KITTENS
----------------------------- */

for(let i = 0; i < kittenCount; i++){

    const el = document.createElement("img");
    el.src = "asset/chaton.jpeg";
    el.className = "kitten";

    document.body.appendChild(el);

    const size = 80 + Math.random() * 80;

    kittens.push({
        el,

        x: Math.random() * (window.innerWidth - size),
        y: Math.random() * (window.innerHeight - size),

        dx: (Math.random() * 3 + 1.5) * (Math.random() < 0.5 ? -1 : 1),
        dy: (Math.random() * 3 + 1.5) * (Math.random() < 0.5 ? -1 : 1),

        size: size,

        rotation: 0,
        spinning: false
    });
}

/* -----------------------------
   COULEUR ALÉATOIRE
----------------------------- */

function randomColorFilter(){

    return colorFilters[
        Math.floor(Math.random() * colorFilters.length)
    ];
}

/* -----------------------------
   ROTATION 360°
----------------------------- */

function spinKitten(k){

    if(k.spinning) return;

    k.spinning = true;
    k.rotation += 360;

    k.el.style.transform =
        `rotate(${k.rotation}deg)`;

    setTimeout(() => {
        k.spinning = false;
    }, 1000);
}

/* -----------------------------
   IMAGE ALÉATOIRE
   70% chaton
   10% marin
   10% valentin
   10% Martin
----------------------------- */

function randomImage(){

    const r = Math.random();

    if(r < 0.10){
        return "asset/marin.png";
    }

    if(r < 0.20){
        return "asset/valentin.png";
    }

    if(r < 0.30){
        return "asset/Martin.png";
    }

    return "asset/chaton.jpeg";
}

/* -----------------------------
   ANIMATION (DVD STYLE)
----------------------------- */

function animate(){

    for(const k of kittens){

        k.x += k.dx;
        k.y += k.dy;

        const size = k.size;

        let bounced = false;

        /* rebond horizontal */
        if(k.x <= 0 || k.x + size >= window.innerWidth){
            k.dx *= -1;
            bounced = true;
        }

        /* rebond vertical */
        if(k.y <= 0 || k.y + size >= window.innerHeight){
            k.dy *= -1;
            bounced = true;
        }

        if(bounced){

            k.el.style.filter = randomColorFilter();

            k.el.src = randomImage();

            if(Math.random() < 0.5){
                spinKitten(k);
            }
        }

        k.el.style.left = k.x + "px";
        k.el.style.top = k.y + "px";

        k.el.style.width = size + "px";
    }

    requestAnimationFrame(animate);
}

animate();

/* -----------------------------
   ROTATIONS ALÉATOIRES
----------------------------- */

setInterval(() => {

    const randomKitten =
        kittens[Math.floor(Math.random() * kittens.length)];

    if(Math.random() < 0.35){
        spinKitten(randomKitten);
    }

}, 2000);

</script>

</body>
</html>
