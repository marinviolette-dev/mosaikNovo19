<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mosaïque TV</title>

<style>

body {
    margin: 0;
    background: black;
    font-family: Arial;
}

/* GRID 2x2 */
#grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    width: 100vw;
    height: 100vh;
}

/* CHAQUE TILE */
.tile {
    position: relative;
    border: 1px solid #222;
    overflow: hidden;
    background: black;
}

/* LABEL */
.label {
    position: absolute;
    top: 5px;
    left: 5px;
    z-index: 2;
    color: white;
    font-size: 14px;
    background: rgba(0,0,0,0.6);
    padding: 3px 6px;
    border-radius: 4px;
}

/* IFRAME */
iframe {
    width: 100%;
    height: 100%;
    border: none;
}

</style>
</head>

<body>

<div id="grid"></div>

<script>

/* -----------------------------
   SOURCES (SAFE STRUCTURE)
----------------------------- */

const channels = {

bfmtv: {
name: "BFMTV",
url: "https://live-cdn-bfmtv-euw1.bfmtv.bct.nextradiotv.com/m1/media.m3u8"
},

lci: {
name: "LCI",
url: "https://www.youtube.com/embed/live_stream?channel=UC-pYf3g6s8Y2hY5g2V6R8xQ"
},

cnews: {
name: "CNEWS",
url: "https://hls-m015-live-aka-canalplus.akamaized.net/live/disk/cnews-clair-hd/hls-v3-hd-clair/cnews-clair-hd.m3u8"
},

franceinfo: {
name: "France Info",
url: "https://youtu.be/NG7ZX42nZKc"
},

novo19: {
name: "NOVO19",
url: "https://poland.assistancefrancaise.com/hls/transcoder03/8/tracks-v1a1/mono.ts.m3u8"
},

tf1: {
name: "TF1",
url: "https://www.youtube.com/embed/live_stream?channel=UC1TF1PLACEHOLDER"
},

france2: {
name: "France 2",
url: "https://www.youtube.com/embed/live_stream?channel=UC2FRANCEPLACEHOLDER"
}

    };

/* -----------------------------
   GROUPS
----------------------------- */

const groups = {

g1: [channels.bfmtv, channels.lci, channels.cnews, channels.franceinfo],
g2: [channels.bfmtv, channels.lci, channels.franceinfo, channels.novo19],
g3: [channels.bfmtv, channels.tf1, channels.france2, channels.cnews]

};

/* -----------------------------
   SAFE ROUTING
----------------------------- */

const params = new URLSearchParams(window.location.search);
const groupId = params.get("group");

const selected = groups[groupId] || groups.g1;

/* -----------------------------
   GRID SAFE RENDER
----------------------------- */

const grid = document.getElementById("grid");

selected.forEach((channel) => {

    const tile = document.createElement("div");
    tile.className = "tile";

    const label = document.createElement("div");
    label.className = "label";
    label.textContent = channel.name;

    const iframe = document.createElement("iframe");

    iframe.src = channel.url;

    iframe.setAttribute("allow", "autoplay; encrypted-media");
    iframe.setAttribute("allowfullscreen", "");
    iframe.setAttribute("loading", "lazy");

    /* sécurité anti-crash visuel */
    iframe.style.background = "black";

    tile.appendChild(label);
    tile.appendChild(iframe);

    grid.appendChild(tile);
});

</script>

</body>
</html>
